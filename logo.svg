<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- AI icon -->
  <circle cx="22" cy="25" r="18" fill="none" stroke="url(#grad)" stroke-width="2.5"/>
  <circle cx="22" cy="25" r="12" fill="none" stroke="url(#sparkle)" stroke-width="1.5"/>
  <circle cx="22" cy="25" r="5" fill="url(#grad)"/>
  <!-- Neural lines -->
  <line x1="22" y1="7" x2="22" y2="13" stroke="url(#sparkle)" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="37" x2="22" y2="43" stroke="url(#sparkle)" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="25" x2="10" y2="25" stroke="url(#sparkle)" stroke-width="2" stroke-linecap="round"/>
  <line x1="34" y1="25" x2="40" y2="25" stroke="url(#sparkle)" stroke-width="2" stroke-linecap="round"/>
  <!-- Diagonal nodes -->
  <circle cx="10" cy="13" r="2.5" fill="url(#sparkle)"/>
  <circle cx="34" cy="13" r="2.5" fill="url(#sparkle)"/>
  <circle cx="10" cy="37" r="2.5" fill="url(#sparkle)"/>
  <circle cx="34" cy="37" r="2.5" fill="url(#sparkle)"/>
  <line x1="12" y1="14" x2="17" y2="19" stroke="url(#sparkle)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="14" x2="27" y2="19" stroke="url(#sparkle)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="36" x2="17" y2="31" stroke="url(#sparkle)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="27" y2="31" stroke="url(#sparkle)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Text -->
  <text x="50" y="34" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="url(#grad)">AInime</text>
</svg>
